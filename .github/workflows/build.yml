name: OpenWrt-immortalwrtзүҲ

on:
  schedule:
    - cron: 0 22 * * *
  push:
    paths:
      - OpenWrt-immortalwrt.config
      - diy-part1.sh
      - diy-part2.sh
      - files/**
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: OpenWrt-immortalwrt.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CONFIG_CACHE_REF: pkg_ref.txt
  UPSTREAM_COMMIT_FILE: upstream_commit.txt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Free Disk Space
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_dotnet: true
        remove_haskell: true
        remove_tool_cache: true
        remove_swap: false
        remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable chromedriver google-cloud-sdk firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-* gfortran* imagemagick* *-jdk mongodb-* mono-* monodoc-* unixodbc-dev ant* perl libgl1-mesa-dri apache2* imagemagick* nginx phantomjs php* libpq-dev r-base* ruby* sphinxsearch"
        remove_packages_one_command: true
        remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia* /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle* /usr/local/bin/azcopy /usr/share/kotlinc /usr/share/apache-maven-* /usr/local/share/gecko_driver /usr/share/lintian"

    - name: Checkout жӢүеҸ–иҮӘе®ҡд№үж–Үд»¶
      uses: actions/checkout@v6

    - name: жҢӮиҪҪ4G Swap зј“и§ЈеҶ…еӯҳжәўеҮә
      run: |
        cd "$GITHUB_WORKSPACE"
        sudo dd if=/dev/zero of=swapfile bs=1M count=4096 status=none
        sudo chmod 600 swapfile
        sudo mkswap swapfile
        sudo swapon swapfile
        echo 10 | sudo tee /proc/sys/vm/swappiness
        free -h

    - name: жҒўеӨҚзј–иҜ‘зј“еӯҳ
      uses: actions/cache@v6
      with:
        path: |
          openwrt/dl
          openwrt/build_dir
          openwrt/staging_dir
          .ccache
          ${{ env.CONFIG_CACHE_REF }}
          ${{ env.UPSTREAM_COMMIT_FILE }}
          old_commit.txt
        key: mt798x-6.6-build-${{ github.sha }}
        restore-keys: mt798x-6.6-build-

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq full-upgrade
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
        bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
        genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
        libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
        libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf \
        python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
        swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo rm -rf /etc/apt/sources.list.d/* /usr/local/lib/android /opt/ghc /usr/share/dotnet /usr/local/graalvm /usr/local/.ghcup \
        /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$GROUPS $GITHUB_WORKSPACE

    - name: Enable CCache
      run: |
        echo "export CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
        echo "export CCACHE_MAXSIZE=10G" >> $GITHUB_ENV

    - name: Clone / Update source code
      run: |
        if [ -d "openwrt" ]; then
          if [ ! -d "openwrt/.git" ]; then
            rm -rf openwrt
          fi
        fi
        if [ -d openwrt/.git ];then
          cd openwrt
          git fetch origin $REPO_BRANCH
          git reset --hard origin/$REPO_BRANCH
        else
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        fi
        cd openwrt
        git rev-parse HEAD > ../${{ env.UPSTREAM_COMMIT_FILE }}

    - name: жү§иЎҢdiyвҖ‘part1.sh
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Load custom configuration & жү§иЎҢdiyвҖ‘part2.sh
      run: |
        [ -d "$GITHUB_WORKSPACE/files" ] && cp -rf "$GITHUB_WORKSPACE/files" "$GITHUB_WORKSPACE/openwrt/"
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: жҸҗеҸ–жҸ’д»¶й…ҚзҪ®з”ЁдәҺжЈҖжөӢеҸҳжӣҙ
      run: |
        cd openwrt
        grep -E '^(CONFIG_PACKAGE_|CONFIG_LUCI_|CONFIG_COLLECT_)' .config > ../current_pkg.txt

    - name: еҲӨж–ӯжҳҜеҗҰжү§иЎҢе®Ңж•ҙзј–иҜ‘
      id: judge_build
      run: |
        NEED_BUILD=0
        touch old_commit.txt

        #жЈҖжөӢдёҠжёёжәҗз Ғжӣҙж–°
        if [ -f ${{ env.CONFIG_CACHE_REF }} ] && [ -f ${{ env.UPSTREAM_COMMIT_FILE }} ] && [ -f old_commit.txt ]; then
          if ! diff -q ${{ env.UPSTREAM_COMMIT_FILE }} old_commit.txt; then
            echo "вҡ пёҸ дёҠжёёжәҗз Ғжӣҙж–°пјҢејәеҲ¶зј–иҜ‘"
            NEED_BUILD=1
          fi
        fi

        #еҜ№жҜ”жҸ’д»¶й…ҚзҪ®пјҢиҫ“еҮәеҸҳжӣҙжё…еҚ•
        if [ $NEED_BUILD -eq 0 ] && [ -f ${{ env.CONFIG_CACHE_REF }} ]; then
          if diff -q current_pkg.txt ${{ env.CONFIG_CACHE_REF }}; then
            echo "вң… жҸ’д»¶й…ҚзҪ®ж— еҸҳжӣҙпјҢеҒңжӯўзј–иҜ‘"
          else
            echo "вҡ пёҸ жҸ’д»¶й…ҚзҪ®еҸҳжӣҙжё…еҚ•пјҡ"
            diff -u ${{ env.CONFIG_CACHE_REF }} current_pkg.txt | grep -E '^[+-]' | grep -v '^[+-][+-]'
            NEED_BUILD=1
          fi
        elif [ $NEED_BUILD -eq 0 ]; then
          echo "в„№пёҸ йҰ–ж¬ЎиҝҗиЎҢж— зј“еӯҳпјҢжү§иЎҢзј–иҜ‘"
          NEED_BUILD=1
        fi

        #жӣҙж–°дёҠжёёcommitи®°еҪ•
        cp ${{ env.UPSTREAM_COMMIT_FILE }} old_commit.txt || true

        #д»…зј–иҜ‘жҲҗеҠҹж—¶жӣҙж–°жҸ’д»¶зј“еӯҳж–Үд»¶
        if [ "$NEED_BUILD" = "1" ]; then
          UPDATE_PKG=1
        else
          UPDATE_PKG=0
        fi
        echo "UPDATE_PKG=$UPDATE_PKG" >> $GITHUB_ENV
        echo "NEED_BUILD=$NEED_BUILD" >> $GITHUB_ENV

    - name: Download package
      id: package
      if: env.NEED_BUILD == '1'
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      if: env.NEED_BUILD == '1'
      run: |
        cd openwrt
        echo "===== еҚ•зәҝзЁӢзј–иҜ‘е·Ҙе…·й“ҫ&еҶ…ж ёпјҢеҺӢдҪҺеҶ…еӯҳеі°еҖј ====="
        nice -n 10 make -j1 tools/compile toolchain/compile target/compile
        echo "===== еӨҡзәҝзЁӢзј–иҜ‘иҪҜд»¶еҢ… ====="
        nice -n 10 make -j$(nproc) package/compile || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV

    - name: жӣҙж–°й…ҚзҪ®еҜ№жҜ”зј“еӯҳ
      if: env.UPDATE_PKG == '1'
      run: cp current_pkg.txt ${{ env.CONFIG_CACHE_REF }}

    - name: Check space usage
      if: (!cancelled() && env.NEED_BUILD == '1')
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v6
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' && env.NEED_BUILD == '1'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled() && env.NEED_BUILD == '1'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v6
      if: steps.organize.outputs.status == 'success' && !cancelled() && env.NEED_BUILD == '1'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to cowtransfer
      id: cowtransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled() && env.NEED_BUILD == '1'
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer cow --block 2621440 -s -p 64 --no-progress ${FIRMWARE} 2>&1 | tee cowtransfer.log
        echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
        echo "url=$(cat cowtransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Upload firmware to WeTransfer
      id: wetransfer
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled() && env.NEED_BUILD == '1'
      run: |
        curl -fsSL git.io/file-transfer | sh
        ./transfer wet -s -p 16 --no-progress ${FIRMWARE} 2>&1 | tee wetransfer.log
        echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
        echo "url=$(cat wetransfer.log | grep https | cut -f3 -d" ")" >> $GITHUB_OUTPUT

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled() && env.NEED_BUILD == '1'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        [ $UPLOAD_COWTRANSFER = true ] && echo "рҹ”— [Cowtransfer](${{ steps.cowtransfer.outputs.url }})" >> release.txt
        [ $UPLOAD_WETRANSFER = true ] && echo "рҹ”— [WeTransfer](${{ steps.wetransfer.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled() && env.NEED_BUILD == '1'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: ophub/delete-releases-workflows@main
      with:
        delete_releases: false
        delete_workflows: true
        workflows_keep_day: 7
        gh_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Remove old Releases
      uses: ophub/delete-releases-workflows@main
      if: env.UPLOAD_RELEASE == 'true' && !cancelled() && env.NEED_BUILD == '1'
      with:
        delete_releases: true
        releases_keep_latest: 5
        delete_tags: true
        gh_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Clean up swap
      if: always()
      run: |
        cd "$GITHUB_WORKSPACE"
        sudo swapoff swapfile || true
        sudo rm -f swapfile
