name: ImmortalWrt MT798x 6.6 
on:
  # 北京时间每日早上6点 = UTC 前一天22点
  schedule:
    - cron: '0 22 * * *'
  # 仅修改指定文件才触发构建
  push:
    branches:
      - openwrt-24.10-6.6
    paths:
      - '.config'
      - 'diy-part1.sh'
      - 'diy-part2.sh'
      - 'feeds/**'
      - 'package/**'
  # 手动一键运行
  workflow_dispatch:

env:
  CACHE_PREFIX: mt798x-6.6-build
  CONFIG_REF: pkg_ref.txt
  TARGET_BRANCH: openwrt-24.10-6.6
  REPO_OWNER_REPO: padavanonly/immortalwrt-mt798x-6.6

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取官方 ImmortalWrt MT798x 源码
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_OWNER_REPO }}
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 1

      # 拉取本仓库自定义文件(.config、diy脚本)
      - name: 拉取自定义配置与DIY脚本
        uses: actions/checkout@v4
        with:
          path: custom-files
          fetch-depth: 1

      # 缓存下载包、编译中间文件、配置对比基准
      - name: 恢复编译缓存
        uses: actions/cache@v4
        with:
          path: |
            dl
            build_dir
            staging_dir
            ${{ env.CONFIG_REF }}
          key: ${{ env.CACHE_PREFIX }}-${{ github.sha }}
          restore-keys: ${{ env.CACHE_PREFIX }}-

      # 加载自定义 .config
      - name: 加载自定义固件配置
        run: |
          if [ -f custom-files/.config ]; then
            echo "✅ 加载自定义 .config"
            cp custom-files/.config .config
          else
            echo "ℹ️ 无自定义配置，使用源码默认config"
          fi

      # diy-part1：替换golang、添加feeds源、拉第三方插件、内置feeds update
      - name: 执行 diy-part1.sh（替换工具链+拉取插件+更新feeds）
        run: |
          if [ -f custom-files/diy-part1.sh ]; then
            chmod +x custom-files/diy-part1.sh
            echo "🔧 开始执行 diy-part1.sh"
            bash custom-files/diy-part1.sh
          else
            echo "ℹ️ 不存在 diy-part1.sh，跳过"
          fi

      # diy-part2：修改LAN IP、时区、主机名等系统默认配置
      - name: 执行 diy-part2.sh（修改路由默认参数）
        run: |
          if [ -f custom-files/diy-part2.sh ]; then
            chmod +x custom-files/diy-part2.sh
            echo "🔧 开始执行 diy-part2.sh"
            bash custom-files/diy-part2.sh
          else
            echo "ℹ️ 不存在 diy-part2.sh，跳过"
          fi

      # 提取所有插件配置行，用于判断是否需要编译
      - name: 提取插件配置用于变更检测
        run: |
          grep -E '^(CONFIG_PACKAGE_|CONFIG_LUCI_|CONFIG_COLLECT_)' .config > current_pkg.txt

      # 判断编译逻辑：定时强制编译；推送仅插件/配置改动才编译
      - name: 判断是否执行编译
        id: judge_build
        run: |
          NEED_BUILD=0
          # 定时任务直接强制完整编译
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "⏰ 定时任务触发，强制完整编译"
            NEED_BUILD=1
          else
            # 检测自定义脚本/插件源码是否修改
            if git diff --quiet HEAD^ HEAD -- feeds/ package/ custom-files/; then
              echo "✅ feeds/package/diy脚本无修改"
            else
              echo "⚠️ 插件源码/DIY脚本变更，需要编译"
              NEED_BUILD=1
            fi
            # 源码无改动再对比.config插件勾选
            if [ $NEED_BUILD -eq 0 ] && [ -f ${{ env.CONFIG_REF }} ]; then
              if diff -q current_pkg.txt ${{ env.CONFIG_REF }}; then
                echo "✅ 插件配置完全一致，跳过编译"
              else
                echo "⚠️ .config插件勾选变更，需要编译"
                NEED_BUILD=1
              fi
            elif [ $NEED_BUILD -eq 0 ]; then
              echo "ℹ️ 首次运行无缓存配置，开始编译"
              NEED_BUILD=1
            fi
          fi
          echo "NEED_BUILD=$NEED_BUILD" >> $GITHUB_ENV

      # 安装编译依赖
      - name: 安装编译环境依赖
        if: env.NEED_BUILD == 1
        run: |
          sudo apt update -y
          sudo apt install -y build-essential gcc g++ flex bison gawk git wget curl unzip python3 python3-pip libssl-dev libncurses-dev

      # 预下载源码包
      - name: 下载全部源码依赖
        if: env.NEED_BUILD == 1
        run: make -j$(nproc) download

      # 编译固件
      - name: 编译 MT798x 6.6 固件
        if: env.NEED_BUILD == 1
        run: make -j$(nproc)

      # 保存本次插件配置到缓存，用于下次对比
      - name: 更新配置对比基准
        if: env.NEED_BUILD == 1
        run: cp current_pkg.txt ${{ env.CONFIG_REF }}

      # 上传固件成品
      - name: 上传编译完成固件
        if: env.NEED_BUILD == 1
        uses: actions/upload-artifact@v4
        with:
          name: MT798x-6.6-Firmware-${{ github.sha }}
          path: bin/targets/
