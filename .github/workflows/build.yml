name: OpenWrt-immortalwrtзүҲ

on:
  schedule:
    - cron: 0 22 * * *
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: OpenWrt-immortalwrt.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CONFIG_CACHE_REF: pkg_ref.txt
  UPSTREAM_COMMIT_FILE: upstream_commit.txt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Free Disk Space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install Dependencies
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion

      - name: Checkout Config & DIY Scripts
        uses: actions/checkout@v4

      - name: Create Swap
        run: |
          sudo dd if=/dev/zero of=swapfile bs=1M count=2048
          sudo mkswap swapfile
          sudo swapon swapfile

      - name: Clone / Update ImmortalWrt source (with retry)
        run: |
          set +e
          for i in {1..5}; do
            if [ -d "openwrt" ] && [ ! -d "openwrt/.git" ]; then
              rm -rf openwrt
            fi
            if [ -d openwrt/.git ];then
              cd openwrt
              git fetch --timeout=120 origin $REPO_BRANCH
              git reset --hard origin/$REPO_BRANCH
            else
              git clone --timeout=120 $REPO_URL -b $REPO_BRANCH openwrt
            fi
            if [ $? -eq 0 ]; then
              break
            fi
            echo "Git fetch/clone failed, retry after 15s, attempt $i"
            sleep 15
          done
          set -e
          cd openwrt
          git rev-parse HEAD > ../${{ env.UPSTREAM_COMMIT_FILE }}
        shell: bash

      - name: Enable CCache
        run: |
          echo "export CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          echo "export CCACHE_MAXSIZE=10G" >> $GITHUB_ENV

      - name: Cache Build Files
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/build_dir
            openwrt/staging_dir
            .ccache
            pkg_ref.txt
            upstream_commit.txt
            old_commit.txt
          key: openwrt-build-${{ github.sha }}
          restore-keys: openwrt-build-

      - name: Prepare Feeds & DIY Part1
        run: |
          chmod +x ./${{ env.DIY_P1_SH }}
          ./${{ env.DIY_P1_SH }}
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          find package/ -type d | sort > ../current_pkg.txt

      - name: Copy .config
        run: |
          cp ./${{ env.CONFIG_FILE }} openwrt/.config

      - name: DIY Part2
        run: |
          chmod +x ./${{ env.DIY_P2_SH }}
          ./${{ env.DIY_P2_SH }}

      - name: Judge Need Build
        id: judge_build
        run: |
          NEED_BUILD=0
          touch old_commit.txt

          if [ -f pkg_ref.txt ] && [ -f upstream_commit.txt ] && [ -f old_commit.txt ]; then
            if ! diff -q upstream_commit.txt old_commit.txt; then
              echo "вҡ пёҸ дёҠжёёжәҗз Ғжӣҙж–°пјҢејәеҲ¶зј–иҜ‘"
              NEED_BUILD=1
            fi
          fi

          if [ $NEED_BUILD -eq 0 ] && [ -f pkg_ref.txt ]; then
            if diff -q current_pkg.txt pkg_ref.txt; then
              echo "вң… жҸ’д»¶ж— еҸҳжӣҙпјҢи·іиҝҮзј–иҜ‘"
            else
              echo "вҡ пёҸ жҸ’д»¶й…ҚзҪ®еҸҳжӣҙжё…еҚ•пјҡ"
              diff -u pkg_ref.txt current_pkg.txt | grep -E '^[+-]' | grep -v '^[+-][+-]'
              NEED_BUILD=1
            fi
          elif [ $NEED_BUILD -eq 0 ]; then
            echo "в„№пёҸ йҰ–ж¬ЎиҝҗиЎҢж— зј“еӯҳпјҢжү§иЎҢзј–иҜ‘"
            NEED_BUILD=1
          fi

          cp upstream_commit.txt old_commit.txt || true
          if [ $NEED_BUILD -eq 1 ]; then
            cp current_pkg.txt pkg_ref.txt || true
          fi
          echo "NEED_BUILD=$NEED_BUILD" >> $GITHUB_ENV

      - name: Compile Firmware
        if: env.NEED_BUILD == '1'
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc) V=sc

      - name: Upload Bin Directory
        if: env.NEED_BUILD == '1' && env.UPLOAD_BIN_DIR == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-bin
          path: openwrt/bin

      - name: Generate Release Tag
        if: env.NEED_BUILD == '1' && env.UPLOAD_RELEASE == 'true'
        run: |
          echo "RELEASE_TAG=$(date +%Y.%m.%d-%H%M)" >> $GITHUB_ENV

      - name: Build Release
        if: env.NEED_BUILD == '1' && env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OpenWrt Firmware ${{ env.RELEASE_TAG }}
          files: openwrt/bin/targets/*/*/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean Swap
        if: always()
        run: |
          sudo swapoff -a || true
          rm -rf swapfile || true
